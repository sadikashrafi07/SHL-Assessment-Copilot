services:
  - type: web
    name: shl-agent-backend
    env: python
    plan: free
    rootDir: Back-End
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false